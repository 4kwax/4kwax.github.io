name: Auto Publish Future Posts

on:
  schedule:
    # भारत (Kolkata) के टाइम के हिसाब से ठीक रात के 12:00 बजे
    - cron: '30 18 * * *'
    # हर 2 घंटे में एक बार बैकअप चेकिंग
    - cron: '0 */2 * * *'
  workflow_dispatch: # मैन्युअल क्लिक करने का बटन

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages Rebuild
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
